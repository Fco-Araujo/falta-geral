<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Pedido de Falta</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-body">
  <div class="login-bg-shape shape-1"></div>
  <div class="login-bg-shape shape-2"></div>
  <div class="login-bg-shape shape-3"></div>

  <main class="login-wrapper">
    <section class="login-card-modern">
      <div class="login-top">
        <div class="login-logo">
          <span>+</span>
        </div>

        <div class="login-heading">
          <h1>Pedido de Falta</h1>
          
        </div>
      </div>

      <form id="loginForm" class="login-form-modern">
        <div class="input-group">
          <label for="nome">Seu nome</label>
          <input type="text" id="nome" placeholder="Digite seu nome" required />
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">
          Entrar no sistema
        </button>
      </form>

      <div class="login-footer-note">
        
      </div>
    </section>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
